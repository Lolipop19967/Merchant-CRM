<script>
// ====================== FIXED SCRIPT ======================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAqHUWBna-PsmZsAzDoq_l1Yf4HWECAGp4",

};

const STATUSES = ['In Progress','Live','Paused','Cancelled'];
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const TZ = ['EST','CST','MST','PST','AEDT','BST','UTC-12','UTC-11','UTC-10','UTC-9','UTC-8 (PT)','UTC-7 (MT)','UTC-6 (CT)','UTC-5 (ET)','UTC-4','UTC-3','UTC-2','UTC-1','UTC+0','UTC+1','UTC+2 (SAST)','UTC+3','UTC+4','UTC+5','UTC+5:30','UTC+6','UTC+7','UTC+8','UTC+9','UTC+10','UTC+11','UTC+12'];
const MODULES = ['Staff','Roles','Company','Services','Classes','Memberships','Schedules','Promotions','Customer','Leads','Automations','Cancellation Policy','Featured Items','Products','Resources','POS','Payments','Positions','Branch','Marketing'];

let merchants = [], activeStatusFilter = 'All', db = null, dbRef = null, useFirebase = false;
let editingId = null, pendingDocs = [], currentPage = 'merchants';

// FIXED: Everything waits for DOM to be ready
document.addEventListener('DOMContentLoaded', () => {
  // Populate timezone
  const tzSel = document.getElementById('f-timezone');
  if (tzSel) {
    TZ.forEach(t => {
      const o = document.createElement('option');
      o.value = o.textContent = t;
      tzSel.appendChild(o);
    });
    tzSel.value = 'EST';
  }

  // Populate module grid
  const mg = document.getElementById('moduleGrid');
  if (mg) {
    MODULES.forEach(m => {
      const s = document.createElement('span');
      s.className = 'module-tag';
      s.textContent = m;
      s.dataset.mod = m;
      s.onclick = () => s.classList.toggle('selected');
      mg.appendChild(s);
    });
  }

  // Start the app
  initFirebase();
  showPage('merchants');
});

// ====================== YOUR ORIGINAL FUNCTIONS (unchanged) ======================
function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.databaseURL) {
    document.getElementById('configBanner').style.display = 'flex';
    setSyncStatus('disconnected','Local storage only');
    merchants = JSON.parse(localStorage.getItem('mccrm_v5')||'[]');
    render(); return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database(); 
    dbRef = db.ref('merchants'); 
    useFirebase = true;
    setSyncStatus('syncing','Connecting…');
    dbRef.on('value', snap => {
      const d = snap.val();
      merchants = d ? Object.keys(d).map(k=>({...d[k],_fbKey:k})) : [];
      localStorage.setItem('mccrm_v5', JSON.stringify(merchants));
      setSyncStatus('connected','Synced to Firebase');
      render();
    }, err => {
      setSyncStatus('disconnected','Sync error');
      merchants = JSON.parse(localStorage.getItem('mccrm_v5')||'[]');
      render();
    });
  } catch(e) {
    document.getElementById('configBanner').style.display = 'flex';
    setSyncStatus('disconnected','Config error');
    merchants = JSON.parse(localStorage.getItem('mccrm_v5')||'[]');
    render();
  }
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (dot) dot.className = 'sync-dot ' + state;
  if (txt) txt.textContent = text;
}

function saveData(cb) {
  localStorage.setItem('mccrm_v5', JSON.stringify(merchants));
  if (useFirebase && dbRef) {
    setSyncStatus('syncing','Saving…');
    const obj = {};
    merchants.forEach(m => { const k = m._fbKey||String(m.id); const c={...m}; delete c._fbKey; obj[k]=c; });
    dbRef.set(obj).then(()=>{setSyncStatus('connected','Synced');if(cb)cb();}).catch(()=>{setSyncStatus('disconnected','Save failed');if(cb)cb();});
  } else { if(cb)cb(); }
}

// buildInternalReportHTML, generateDOCX, para, heading1, etc., buildZip, crc32, etc.

initFirebase(); // extra safety (won't hurt)

</script>
