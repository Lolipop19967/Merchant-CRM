<script>
// ===================== FIXED SCRIPT - ALL YOUR CODE KEPT =====================
const FIREBASE_CONFIG = {

const STATUSES = ['In Progress','Live','Paused','Cancelled'];
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const TZ = ['EST','CST','MST','PST','AEDT','BST','UTC-12','UTC-11','UTC-10','UTC-9','UTC-8 (PT)','UTC-7 (MT)','UTC-6 (CT)','UTC-5 (ET)','UTC-4','UTC-3','UTC-2','UTC-1','UTC+0','UTC+1','UTC+2 (SAST)','UTC+3','UTC+4','UTC+5','UTC+5:30','UTC+6','UTC+7','UTC+8','UTC+9','UTC+10','UTC+11','UTC+12'];
const MODULES = ['Staff','Roles','Company','Services','Classes','Memberships','Schedules','Promotions','Customer','Leads','Automations','Cancellation Policy','Featured Items','Products','Resources','POS','Payments','Positions','Branch','Marketing'];

let merchants = [], activeStatusFilter = 'All', db = null, dbRef = null, useFirebase = false;

// FIXED: Everything waits for the page to load
document.addEventListener('DOMContentLoaded', () => {
  // Populate timezone select
  const tzSel = document.getElementById('f-timezone');
  TZ.forEach(t => {
    const o = document.createElement('option');

  });
  tzSel.value = 'EST';

  // Populate module tags
  const mg = document.getElementById('moduleGrid');

    const s = document.createElement('span');

  });

  // Now start everything
  initFirebase();

// ==================== ALL YOUR ORIGINAL FUNCTIONS (100% unchanged) ====================
function migrateLocalData() {
  const oldKeys = ['mccrm', 'mccrm_v1', 'mccrm_v2', 'mccrm_v3', 'mccrm_v4'];
  if (!localStorage.getItem('mccrm_v5')) {
    for (const key of oldKeys) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key)||'null');
        if (Array.isArray(parsed) && parsed.length > 0) {
          localStorage.setItem('mccrm_v5', JSON.stringify(parsed));
          break;
        }
      } catch(e) {}
    }
  }
}

function loadFromLocal() {
  merchants = JSON.parse(localStorage.getItem('mccrm_v5')||'[]');
  render();
}

function initFirebase() {
  migrateLocalData();
  if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.databaseURL) {
    setSyncStatus('disconnected','Local storage only');
    loadFromLocal(); return;
  }
  setSyncStatus('syncing', 'Loading…');
  const restURL = FIREBASE_CONFIG.databaseURL + '/merchants.json';
  fetch(restURL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(d => {
      if (d && typeof d === 'object' && !Array.isArray(d)) {
        merchants = Object.keys(d).map(k => ({...d[k], _fbKey: k}));
        localStorage.setItem('mccrm_v5', JSON.stringify(merchants));
        setSyncStatus('connected', 'Connected · ' + merchants.length + ' merchants');
      } else {
        merchants = JSON.parse(localStorage.getItem('mccrm_v5')||'[]');
        setSyncStatus('connected', merchants.length ? 'Local data loaded' : 'Connected – no data yet');
      }
      render();
    })
    .catch(err => {
      console.warn('REST fetch failed:', err);
      setSyncStatus('disconnected', 'Offline – using local data');
      loadFromLocal();
    });

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    dbRef = db.ref('merchants');
    useFirebase = true;
    dbRef.on('value', snap => {
      const d = snap.val();
      if (d && typeof d === 'object') {
        const updated = Object.keys(d).map(k => ({...d[k], _fbKey: k}));
        if (JSON.stringify(updated) !== JSON.stringify(merchants)) {
          merchants = updated;
          localStorage.setItem('mccrm_v5', JSON.stringify(merchants));
          setSyncStatus('connected', 'Live · ' + merchants.length + ' merchants');
          render();
        }
      }
    });
  } catch(e) {
    console.warn('Firebase SDK init error:', e);
    useFirebase = false;
  }
}

function setSyncStatus(state, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}

function saveData(cb) {
  localStorage.setItem('mccrm_v5', JSON.stringify(merchants));
  const obj = {};
  merchants.forEach(m => { const k = m._fbKey||String(m.id); const c={...m}; delete c._fbKey; obj[k]=c; });
  const restSave = (onOk, onFail) => {
    fetch(FIREBASE_CONFIG.databaseURL + '/merchants.json', {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(obj)
    }).then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(onOk).catch(onFail);
  };
  if (useFirebase && dbRef) {
    setSyncStatus('syncing','Saving…');
    dbRef.set(obj)
      .then(() => { setSyncStatus('connected','Synced'); if(cb)cb(); })
      .catch(() => restSave(() => { setSyncStatus('connected','Synced'); if(cb)cb(); }, () => { setSyncStatus('disconnected','Saved locally only'); if(cb)cb(); }));
  } else if (FIREBASE_CONFIG.databaseURL) {
    setSyncStatus('syncing','Saving…');
    restSave(() => { setSyncStatus('connected','Synced'); if(cb)cb(); }, () => { setSyncStatus('disconnected','Saved locally only'); if(cb)cb(); });
  } else { if(cb)cb(); }
}
